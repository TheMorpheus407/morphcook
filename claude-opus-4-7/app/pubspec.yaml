name: morphcook
description: A separate, fully-authored recipe for every body. Offline cookbook.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  file_picker: ^8.0.6
  intl: ^0.20.2
  cryptography: ^2.7.0
  archive: ^3.6.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/dishes.json
    - assets/ontology.json
    - assets/ingredients.json
    - assets/faqs.json
    - assets/ingredient-guide.json
    - assets/partition-manifest.json
    - assets/core-recipes.json
    - assets/extended-recipes.json
    - assets/cuisine-italian.json
    - assets/cuisine-asian.json
    - assets/cuisine-middle-eastern.json
